name: Slack Notice Action
description: A GitHub Action to notify slack.
author: sonots
inputs:
  status:
    description: Specify success or failure or cancelled or custom.
  payload:
    description: |
      json payload
      refs https://github.com/slackapi/node-slack-sdk/blob/v5.0.0/packages/webhook/src/IncomingWebhook.ts#L91-L106)
  mention:
    description: |
      Specify channel or here or `user_id`.
      refs: https://api.slack.com/reference/surfaces/formatting#mentioning-users
    default: ''
  only_mention_fail:
    description: |
      Specify channel or here or `user_id`.
      refs: https://api.slack.com/reference/surfaces/formatting#mentioning-users
    default: ''
  title:
    description: Title for slack notification.
    default: ''
  text:
    description: You can overwrite text.
    default: ''
  text_on_success:
    description: Override text on success only. Wins over `text`.
    default: ''
  text_on_fail:
    description: Override text on failure only. Wins over `text`.
    default: ''
  text_on_cancel:
    description: Override text on cancellation only. Wins over `text`.
    default: ''
  channel:
    description: |
      Slack channel ID or name (e.g. `C0123456789` or `#alerts`).
      Required when using Bot Token mode (`SLACK_BOT_TOKEN`). Ignored
      in Webhook mode (the channel is fixed by the webhook URL).
    default: ''
  username:
    description: |
      Override the bot display name for this message. Bot Token mode
      only — Slack ignores this in Webhook mode.
    default: ''
  icon_emoji:
    description: |
      Override the bot icon for this message with an emoji
      (e.g. `:rocket:`). Bot Token mode only.
    default: ''
  icon_url:
    description: |
      Override the bot icon for this message with an image URL.
      Bot Token mode only.
    default: ''
runs:
  using: node24
  main: dist/index.js
branding:
  icon: bell
  color: blue
